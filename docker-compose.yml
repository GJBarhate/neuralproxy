version: '3.9'
services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: neuralproxy
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 15
    networks: [neuralproxy-net]

  redis:
    image: redis:7.4-alpine
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [neuralproxy-net]

  backend:
    build: ./backend
    ports: ["8080:8080"]
    env_file: ./backend/.env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: neuralproxy
      DB_USER: postgres
      DB_PASS: postgres
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    networks: [neuralproxy-net]
    restart: on-failure

  frontend:
    build: ./frontend
    ports: ["3000:80"]
    depends_on: [backend]
    networks: [neuralproxy-net]

volumes:
  pgdata: {}

networks:
  neuralproxy-net:
    driver: bridge
